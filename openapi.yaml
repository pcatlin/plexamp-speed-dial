openapi: 3.1.0
info:
  title: Plexamp Sonos Speed Dial API
  version: 0.1.0
paths:
  /api/v1/settings/runtime:
    get:
      summary: Get Runtime Settings
      operationId: get_runtime_settings_api_v1_settings_runtime_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeSetupRead'
    put:
      summary: Update Runtime Settings
      operationId: update_runtime_settings_api_v1_settings_runtime_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeSetupUpdate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeSetupRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/health:
    get:
      summary: Health
      operationId: health_api_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/auth/plex/start:
    post:
      summary: Plex Start
      operationId: plex_start_api_v1_auth_plex_start_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlexAuthStartResponse'
  /api/v1/auth/plex/pin/{pin_id}:
    get:
      summary: Plex Poll Pin
      description: Poll OAuth PIN; when login completes, persist token and return
        connected.
      operationId: plex_poll_pin_api_v1_auth_plex_pin__pin_id__get
      parameters:
      - name: pin_id
        in: path
        required: true
        schema:
          type: string
          title: Pin Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlexPinPollResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/plex/complete:
    post:
      summary: Plex Complete
      description: Dev escape hatch (mock token) or single-shot PIN poll if the token
        is ready.
      operationId: plex_complete_api_v1_auth_plex_complete_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlexAuthCompleteRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlexAuthStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/plex/status:
    get:
      summary: Plex Status
      operationId: plex_status_api_v1_auth_plex_status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlexAuthStatusResponse'
  /api/v1/auth/plex/server-test:
    get:
      summary: Plex Server Test
      operationId: plex_server_test_api_v1_auth_plex_server_test_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlexServerTestResponse'
  /api/v1/media/playlists:
    get:
      summary: Media Playlists
      operationId: media_playlists_api_v1_media_playlists_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/media/artists:
    get:
      summary: Media Artists
      operationId: media_artists_api_v1_media_artists_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/media/albums:
    get:
      summary: Media Albums
      operationId: media_albums_api_v1_media_albums_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/media/tracks:
    get:
      summary: Media Tracks
      operationId: media_tracks_api_v1_media_tracks_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/media/tracks-for-parent:
    get:
      summary: Media Tracks For Parent
      operationId: media_tracks_for_parent_api_v1_media_tracks_for_parent_get
      parameters:
      - name: family
        in: query
        required: true
        schema:
          enum:
          - playlist
          - album
          - artist
          type: string
          title: Family
      - name: parent_id
        in: query
        required: true
        schema:
          type: string
          title: Parent Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 50
          minimum: 1
          default: 50
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MediaItem'
                title: Response Media Tracks For Parent Api V1 Media Tracks For Parent
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/media/collections:
    get:
      summary: Media Collections
      operationId: media_collections_api_v1_media_collections_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/media/random-album:
    get:
      summary: Media Random Album
      operationId: media_random_album_api_v1_media_random_album_get
      parameters:
      - name: collection_id
        in: query
        required: true
        schema:
          type: string
          title: Collection Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/media/search:
    get:
      summary: Media Search
      operationId: media_search_api_v1_media_search_get
      parameters:
      - name: family
        in: query
        required: true
        schema:
          type: string
          title: Family
      - name: query
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Query
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MediaItem'
                title: Response Media Search Api V1 Media Search Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/media/suggestions:
    get:
      summary: Media Suggestions
      operationId: media_suggestions_api_v1_media_suggestions_get
      parameters:
      - name: family
        in: query
        required: true
        schema:
          type: string
          title: Family
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaSuggestionsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/media/art/{rating_key}:
    get:
      summary: Media Art
      operationId: media_art_api_v1_media_art__rating_key__get
      parameters:
      - name: rating_key
        in: path
        required: true
        schema:
          type: integer
          title: Rating Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sonos/speakers:
    get:
      summary: Sonos Speakers
      operationId: sonos_speakers_api_v1_sonos_speakers_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/SonosSpeaker'
                type: array
                title: Response Sonos Speakers Api V1 Sonos Speakers Get
  /api/v1/sonos/group-presets:
    get:
      summary: Get Presets
      operationId: get_presets_api_v1_sonos_group_presets_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/SonosGroupPresetRead'
                type: array
                title: Response Get Presets Api V1 Sonos Group Presets Get
    post:
      summary: Create Preset
      operationId: create_preset_api_v1_sonos_group_presets_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SonosGroupPresetCreate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sonos/group-presets/{preset_id}:
    delete:
      summary: Delete Preset
      operationId: delete_preset_api_v1_sonos_group_presets__preset_id__delete
      parameters:
      - name: preset_id
        in: path
        required: true
        schema:
          type: integer
          title: Preset Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                title: Response Delete Preset Api V1 Sonos Group Presets  Preset Id  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/players:
    get:
      summary: Players
      operationId: players_api_v1_players_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/PlayerRead'
                type: array
                title: Response Players Api V1 Players Get
    post:
      summary: Create Player
      operationId: create_player_api_v1_players_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayerCreate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/players/{player_id}:
    delete:
      summary: Delete Player
      operationId: delete_player_api_v1_players__player_id__delete
      parameters:
      - name: player_id
        in: path
        required: true
        schema:
          type: integer
          title: Player Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                title: Response Delete Player Api V1 Players  Player Id  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/play:
    post:
      summary: Play
      operationId: play_api_v1_play_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/plexamp/skip-next:
    post:
      summary: Plexamp Skip Next
      operationId: plexamp_skip_next_api_v1_plexamp_skip_next_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayerControlRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/plexamp/skip-previous:
    post:
      summary: Plexamp Skip Previous
      operationId: plexamp_skip_previous_api_v1_plexamp_skip_previous_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayerControlRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/plexamp/pause:
    post:
      summary: Plexamp Pause
      operationId: plexamp_pause_api_v1_plexamp_pause_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayerControlRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sonos/play-line-in:
    post:
      summary: Sonos Play Line In
      operationId: sonos_play_line_in_api_v1_sonos_play_line_in_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SonosStopRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sonos/stop:
    post:
      summary: Sonos Stop
      operationId: sonos_stop_api_v1_sonos_stop_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SonosStopRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/speed-dial:
    get:
      summary: Speed Dial
      operationId: speed_dial_api_v1_speed_dial_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/SpeedDialRead'
                type: array
                title: Response Speed Dial Api V1 Speed Dial Get
    post:
      summary: Create Speed Dial
      operationId: create_speed_dial_api_v1_speed_dial_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeedDialCreate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/speed-dial/{favorite_id}/play:
    post:
      summary: Play Speed Dial Favorite
      operationId: play_speed_dial_favorite_api_v1_speed_dial__favorite_id__play_post
      parameters:
      - name: favorite_id
        in: path
        required: true
        schema:
          type: integer
          title: Favorite Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/speed-dial/{favorite_id}/cover:
    get:
      summary: Speed Dial Cover
      operationId: speed_dial_cover_api_v1_speed_dial__favorite_id__cover_get
      parameters:
      - name: favorite_id
        in: path
        required: true
        schema:
          type: integer
          title: Favorite Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/speed-dial/{favorite_id}:
    delete:
      summary: Delete Speed Dial
      operationId: delete_speed_dial_api_v1_speed_dial__favorite_id__delete
      parameters:
      - name: favorite_id
        in: path
        required: true
        schema:
          type: integer
          title: Favorite Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                title: Response Delete Speed Dial Api V1 Speed Dial  Favorite Id  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthResponse:
      properties:
        status:
          type: string
          title: Status
          default: ok
      type: object
      title: HealthResponse
    IdResponse:
      properties:
        id:
          type: integer
          minimum: 1.0
          title: Id
      type: object
      required:
      - id
      title: IdResponse
    MediaItem:
      properties:
        id:
          type: string
          title: Id
        title:
          type: string
          title: Title
        subtitle:
          anyOf:
          - type: string
          - type: 'null'
          title: Subtitle
        type:
          type: string
          title: Type
      type: object
      required:
      - id
      - title
      - type
      title: MediaItem
    MediaSuggestionsResponse:
      properties:
        most_played:
          items:
            $ref: '#/components/schemas/MediaItem'
          type: array
          title: Most Played
        unplayed:
          items:
            $ref: '#/components/schemas/MediaItem'
          type: array
          title: Unplayed
        random:
          items:
            $ref: '#/components/schemas/MediaItem'
          type: array
          title: Random
      type: object
      title: MediaSuggestionsResponse
    PlayRequest:
      properties:
        media_type:
          type: string
          enum:
          - playlist
          - album
          - artist
          - track
          - random_album
          title: Media Type
        media_id:
          type: string
          title: Media Id
        player_id:
          type: integer
          title: Player Id
        speaker_ids:
          items:
            type: string
          type: array
          title: Speaker Ids
        preset_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Preset Id
        artist_radio:
          type: boolean
          title: Artist Radio
          description: 'When media_type is artist: True = Plex artist radio station;
            False = queue this artist only.'
          default: true
        shuffle:
          type: boolean
          title: Shuffle
          description: 'When media_type is playlist or artist: request shuffled queue
            from Plexamp.'
          default: false
      type: object
      required:
      - media_type
      - media_id
      - player_id
      title: PlayRequest
    PlayResponse:
      properties:
        status:
          type: string
          title: Status
        details:
          type: string
          title: Details
      type: object
      required:
      - status
      - details
      title: PlayResponse
    PlayerControlRequest:
      properties:
        player_id:
          type: integer
          title: Player Id
      type: object
      required:
      - player_id
      title: PlayerControlRequest
    PlayerCreate:
      properties:
        name:
          type: string
          title: Name
        host:
          type: string
          title: Host
        port:
          type: integer
          title: Port
          default: 32500
        is_active:
          type: boolean
          title: Is Active
          default: true
      type: object
      required:
      - name
      - host
      title: PlayerCreate
    PlayerRead:
      properties:
        name:
          type: string
          title: Name
        host:
          type: string
          title: Host
        port:
          type: integer
          title: Port
          default: 32500
        is_active:
          type: boolean
          title: Is Active
          default: true
        id:
          type: integer
          title: Id
      type: object
      required:
      - name
      - host
      - id
      title: PlayerRead
    PlexAuthCompleteRequest:
      properties:
        pin_id:
          type: string
          title: Pin Id
        code:
          type: string
          title: Code
        mock_token:
          anyOf:
          - type: string
          - type: 'null'
          title: Mock Token
        username:
          anyOf:
          - type: string
          - type: 'null'
          title: Username
      type: object
      required:
      - pin_id
      - code
      title: PlexAuthCompleteRequest
    PlexAuthStartResponse:
      properties:
        pin_id:
          type: string
          title: Pin Id
        code:
          type: string
          title: Code
        auth_url:
          type: string
          title: Auth Url
      type: object
      required:
      - pin_id
      - code
      - auth_url
      title: PlexAuthStartResponse
    PlexAuthStatusResponse:
      properties:
        connected:
          type: boolean
          title: Connected
        username:
          anyOf:
          - type: string
          - type: 'null'
          title: Username
      type: object
      required:
      - connected
      title: PlexAuthStatusResponse
    PlexPinPollResponse:
      properties:
        status:
          type: string
          enum:
          - pending
          - connected
          title: Status
        username:
          anyOf:
          - type: string
          - type: 'null'
          title: Username
      type: object
      required:
      - status
      title: PlexPinPollResponse
    PlexServerTestResponse:
      properties:
        ok:
          type: boolean
          title: Ok
        configured_url:
          type: string
          title: Configured Url
          default: ''
        friendly_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Friendly Name
        music_library_sections:
          items:
            type: string
          type: array
          title: Music Library Sections
        ssl_verify_enabled:
          type: boolean
          title: Ssl Verify Enabled
          default: true
        error_detail:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Detail
      type: object
      required:
      - ok
      title: PlexServerTestResponse
    RuntimeSetupRead:
      properties:
        plex_server_url:
          type: string
          title: Plex Server Url
          description: PMS base URL, e.g. http://192.168.1.10:32400. Set in Setup
            (stored in DB).
          default: ''
        plex_ssl_verify:
          type: boolean
          title: Plex Ssl Verify
          default: true
        sonos_seed_ips:
          type: string
          title: Sonos Seed Ips
          description: Comma-separated LAN IPs of any Sonos speaker (helps Docker
            / no multicast).
          default: ''
        sonos_discover_timeout:
          type: integer
          maximum: 60.0
          minimum: 2.0
          title: Sonos Discover Timeout
          default: 10
