# Images: paulcatlin/* on Docker Hub (fallback when no local build).
#
# After pulling new git code, rebuild the API (and web if the UI changed) or playback-state and
# similar routes will 404 on an old image:
#   docker compose build api web && docker compose up -d
# Or in one step: docker compose up --build -d
#
# Alternate host port for web: docker compose -f docker-compose.yml -f docker-compose.build.yml up [--build]
# Vite HMR while editing frontend: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: plexamp_speed_dial
      POSTGRES_USER: plexamp
      POSTGRES_PASSWORD: plexamp_local_only
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plexamp -d plexamp_speed_dial"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: paulcatlin/plexamp-speed-dial-api:latest
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://plexamp:plexamp_local_only@db:5432/plexamp_speed_dial
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python -m app.db.init_db && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  web:
    image: paulcatlin/plexamp-speed-dial-web:latest
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
