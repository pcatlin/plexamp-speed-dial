# Postgres credentials and API DATABASE_URL are fixed for the default Docker stack (not published to the host).
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: plexamp_speed_dial
      POSTGRES_USER: plexamp
      POSTGRES_PASSWORD: plexamp_local_only
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plexamp -d plexamp_speed_dial"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://plexamp:plexamp_local_only@db:5432/plexamp_speed_dial
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python -m app.db.init_db && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  postgres_data:
