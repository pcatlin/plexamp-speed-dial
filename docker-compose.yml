services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plexamp_speed_dial}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-plexamp_speed_dial}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/plexamp_speed_dial}
      PLEX_SERVER_URL: ${PLEX_SERVER_URL:-}
      PLEX_CLIENT_IDENTIFIER: ${PLEX_CLIENT_IDENTIFIER:-plexamp-speed-dial-web}
      PLEX_SSL_VERIFY: ${PLEX_SSL_VERIFY:-true}
      CORS_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python -m app.db.init_db && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  postgres_data:
